name: musikita
description: "Flutter Local Music Player - Clean Architecture + BLoC + SQLite"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Audio playback
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Database
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Storage & permissions
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.0

  # File operations
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  share_plus: ^10.0.0

  # Theme
  flex_color_scheme: ^8.0.0
  dynamic_color: ^1.7.0

  # Dependency injection
  get_it: ^8.0.2

  # Utilities
  equatable: ^2.0.7
  dartz: ^0.10.1
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.5.0

  # Home screen widget (Android only)
  home_widget: ^0.7.0

  # Device info for Android version detection
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
